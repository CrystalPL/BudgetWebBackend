logging:
  level:
    org:
      hibernate: OFF
spring:
  datasource:
    url: jdbc:h2:mem:test
  jpa:
    show-sql: true
    properties:
      hibernate:
        hbm2ddl:
          import_files_sql_extractor: org.hibernate.tool.schema.internal.script.MultiLineSqlScriptExtractor

account:
  confirmation:
    email:
      config:
        return-confirm-address: http://localhost:8091/account-activation

password-recovery:
  email:
    config:
      return-confirm-address: http://localhost:8091/password-reset
